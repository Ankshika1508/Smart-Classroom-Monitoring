<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register Student - Classroom Monitor</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style/style.css" />

  <style>
    body {
      background: linear-gradient(to right, #dbeafe, #f0fdfa);
      font-family: 'Poppins', sans-serif;
      color: #1e293b;
    }

    h2 {
      font-weight: 600;
      color: #0f172a;
    }

    .form-control {
      border-radius: 10px;
      padding: 10px 15px;
      font-size: 16px;
    }

    .form-label {
      font-weight: 500;
      margin-bottom: 6px;
    }

    .btn-primary {
      background: linear-gradient(to right, #3b82f6, #6366f1);
      border: none;
      font-weight: 500;
      border-radius: 10px;
    }

    .btn-success {
      background: linear-gradient(to right, #10b981, #22c55e);
      border: none;
      font-weight: 500;
      border-radius: 10px;
    }

    .btn-outline-secondary {
      border-radius: 10px;
      padding: 8px 18px;
      font-weight: 500;
    }

    video {
      border: 4px solid #3b82f6;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    form {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
    }

    @media (max-width: 768px) {
      form {
        padding: 20px;
      }

      video {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="container mt-5">
    <h2 class="text-center mb-4">📸 Register Student</h2>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <form>
          <div class="mb-3">
            <label for="studentName" class="form-label">👤 Student Name</label>
            <input type="text" class="form-control" id="studentName" placeholder="Enter student name" required>
          </div>

          <div class="mb-3">
            <label for="studentID" class="form-label">🆔 Student ID</label>
            <input type="text" class="form-control" id="studentID" placeholder="Enter unique ID" required>
          </div>

          <div class="mb-3 text-center">
            <video id="webcam" autoplay width="300"></video>
            <img id="capturedPreview" style="display:none; margin-top: 15px; max-width:300px;" class="border rounded" />
          </div>

          <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary">📷 Capture Face</button>
            <button type="submit" class="btn btn-success">✅ Register</button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Webcam Script -->
  <script>
    const video = document.getElementById('webcam');
  const canvas = document.createElement('canvas');
  let capturedImage = null;

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(function (stream) {
      video.srcObject = stream;
    })
    .catch(function (error) {
      console.error("Webcam not accessible:", error);
    });

  // Capture face on button click
  document.querySelector('.btn.btn-primary').addEventListener('click', function () {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    const imageDataURL = canvas.toDataURL('image/png');
    capturedImage = imageDataURL;

    // Show image preview
    const preview = document.getElementById('capturedPreview');
    preview.src = imageDataURL;
    preview.style.display = 'block';
  });
  </script>
</body>
</html>
