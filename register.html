<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register Student - Classroom Monitor</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style/style.css" />
</head>
<body style="background-color: #f9f9f9;">

  <div class="container mt-5">
    <h2 class="text-center mb-4">📸 Register Student</h2>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <form>
          <div class="mb-3">
            <label for="studentName" class="form-label">👤 Student Name</label>
            <input type="text" class="form-control" id="studentName" placeholder="Enter student name" required>
          </div>

          <div class="mb-3">
            <label for="studentID" class="form-label">🆔 Student ID</label>
            <input type="text" class="form-control" id="studentID" placeholder="Enter unique ID" required>
          </div>

          <div class="mb-3 text-center">
            <video id="webcam" autoplay width="300" class="border rounded"></video>
          </div>

          <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary">📷 Capture Face</button>
            <button type="submit" class="btn btn-success">✅ Register</button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Webcam Connection Script -->
  <script>
    const video = document.getElementById('webcam');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(function (stream) {
        video.srcObject = stream;
      })
      .catch(function (error) {
        console.error("Webcam not accessible:", error);
      });
  </script>

</body>
</html>
