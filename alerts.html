<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alerts - Classroom Monitor</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Font for smooth look -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #7dbcc4, #bb87c4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }


    h2 {
      font-weight: 600;
      color: #333333;
    }

    .alert {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      padding: 0.9rem 1.2rem;
      border-radius: 30px;
    }

    .btn-outline-primary {
      border-radius: 50px;
      padding: 10px 25px;
    }
  </style>
</head>
<body>

  <div class="container text-center">
    <h2 class="mb-4">🚨 REAL-TIME ALERTS</h2>

    <div class="alert alert-danger">
      📱 Student <strong>Toxic Disha</strong> is using phone! Chatting with Boyfriend
    </div>

    <div class="alert alert-warning">
      😴 Student <strong>Ank</strong> seems to be sleeping!
    </div>

    <div class="alert alert-success">
      ✅ All students attentive currently.
    </div>

    <a href="index.html" class="btn btn-outline-primary mt-3">← Back to Dashboard</a>
  </div>

</body>
</html>
