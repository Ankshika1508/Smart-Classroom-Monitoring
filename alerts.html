<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alerts - Classroom Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container py-4">
    <h2 class="text-center mb-4">🚨 Real-time Alerts</h2>

    <div class="alert alert-danger rounded-pill text-center">
      📱 Student <strong>Ankit Sharma</strong> is using phone!
    </div>

    <div class="alert alert-warning rounded-pill text-center">
      😴 Student <strong>Riya Das</strong> seems to be sleeping!
    </div>

    <div class="alert alert-success rounded-pill text-center">
      ✅ All students attentive currently.
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-outline-primary">← Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
